<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJo Craft World</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fffafb; /* Soft cream background */
        }
        header {
            background-color: #f9d68d;
            padding: 15px;
            text-align: center;
        }
        nav {
            margin: 10px;
            background-color: #e6b54c;
            padding: 10px;
        }
        nav a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
        }
        .hero {
            background-color: #fffafb; /* Cream background for hero section */
            padding: 50px;
            text-align: center;
        }
        .gallery {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            flex-wrap: wrap;
        }
        .gallery img {
            width: 30%;
            border-radius: 8px;
            margin: 10px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #f9d68d;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        form {
            margin: 20px auto;
            width: 80%;
            max-width: 600px;
        }
        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        form button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to JoJo Craft World</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
    </nav>
    <section class="hero">
        <h2>Explore Our Craft Creations</h2>
        <p>Your journey into creativity begins here.</p>
    </section>
    <section id="gallery">
        <h2>Gallery</h2>
        <div class="gallery">
            <img src="image1.jpg" alt="Craft 1">
            <img src="image2.jpg" alt="Craft 2">
            <img src="image3.jpg" alt="Craft 3">
        </div>
    </section>
    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 JoJo Craft World</p>
    </footer>
</body>
</html>
